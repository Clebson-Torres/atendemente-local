name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Unit and integration tests
        run: npm run test

      - name: Production build (frontend)
        run: npm run build

  build:
    needs: quality
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Build Rust backend
        run: cargo build --bin server
        working-directory: src-tauri

      - name: Build frontend
        run: npm run build

      - name: Verify binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f src-tauri/target/debug/server.exe && echo "OK: server.exe"
          else
            test -f src-tauri/target/debug/server && echo "OK: server"
          fi
